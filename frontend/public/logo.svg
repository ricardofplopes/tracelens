<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="lens-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="handle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Outer lens ring -->
  <circle cx="17" cy="17" r="12" stroke="url(#ring-grad)" stroke-width="2.5" fill="none"/>
  <!-- Inner lens glass -->
  <circle cx="17" cy="17" r="8.5" fill="url(#lens-grad)" opacity="0.15"/>
  <!-- Scan crosshair lines -->
  <line x1="17" y1="10" x2="17" y2="24" stroke="url(#lens-grad)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="17" x2="24" y2="17" stroke="url(#lens-grad)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="17" cy="17" r="2" fill="url(#lens-grad)" opacity="0.9"/>
  <!-- Handle -->
  <line x1="26" y1="26" x2="35" y2="35" stroke="url(#handle-grad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Shine highlight -->
  <circle cx="12.5" cy="12.5" r="2.5" fill="white" opacity="0.2"/>
</svg>
